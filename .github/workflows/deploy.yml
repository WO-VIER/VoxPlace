name: Deploy VoxPlace Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 161.35.214.248
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /root/deploy.sh
          command_timeout: 10m
